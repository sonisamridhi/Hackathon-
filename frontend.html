<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Study Assistant</title>
  <style>
    :root {
      --bg: #0f172a;
      --bg-accent: #1e293b;
      --panel: #111827;
      --panel-rgb: 17, 24, 39;
      --panel-soft: #1f2937;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --primary: #22d3ee;
      --primary-dark: #0891b2;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --border: #334155;
      --shadow-lg: 0 18px 45px rgba(2, 6, 23, 0.25);
      --shadow-md: 0 10px 25px rgba(2, 6, 23, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: radial-gradient(circle at top left, var(--bg-accent), var(--bg));
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      letter-spacing: 0.1px;
      transition: background 0.35s ease, color 0.25s ease;
    }

    body[data-theme="midnight"] {
      --bg: #0b1220;
      --bg-accent: #1d2b45;
      --panel: #10192b;
      --panel-rgb: 16, 25, 43;
      --panel-soft: #1c2740;
      --text: #e8eef8;
      --muted: #9aa8c5;
      --primary: #60a5fa;
      --primary-dark: #2563eb;
      --border: #334155;
    }

    body[data-theme="emerald"] {
      --bg: #081711;
      --bg-accent: #0f2c1f;
      --panel: #0f1f1a;
      --panel-rgb: 15, 31, 26;
      --panel-soft: #173229;
      --text: #e9f9ef;
      --muted: #9bc5ab;
      --primary: #34d399;
      --primary-dark: #059669;
      --border: #2f4f42;
    }

    body[data-theme="sunset"] {
      --bg: #1b1025;
      --bg-accent: #38223f;
      --panel: #21152e;
      --panel-rgb: 33, 21, 46;
      --panel-soft: #352045;
      --text: #f8ecff;
      --muted: #d1b3e2;
      --primary: #f472b6;
      --primary-dark: #db2777;
      --border: #5b3b73;
    }

    body[data-theme="daylight"] {
      --bg: #eaf2ff;
      --bg-accent: #f8fbff;
      --panel: #ffffff;
      --panel-rgb: 255, 255, 255;
      --panel-soft: #f3f7ff;
      --text: #0f172a;
      --muted: #475569;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #cbd5e1;
    }

    .app {
      max-width: 1280px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 22px;
    }

    .sidebar,
    .main {
      background: rgba(var(--panel-rgb), 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      backdrop-filter: blur(6px);
      box-shadow: var(--shadow-lg);
      transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease;
    }

    .sidebar {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .logo {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--primary), #38bdf8);
      display: grid;
      place-items: center;
      color: #0f172a;
      font-weight: bold;
    }

    .brand h1 {
      font-size: 1.12rem;
      font-weight: 700;
    }

    .brand p {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .section-title {
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .panel-block {
      background: color-mix(in oklab, var(--panel-soft) 72%, var(--panel) 28%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow-md);
    }

    .tool-grid {
      display: grid;
      gap: 10px;
    }

    .tool-btn {
      width: 100%;
      text-align: left;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .tool-btn:hover {
      border-color: var(--primary);
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.2);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-card {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .stat-card:hover {
      transform: translateY(-1px);
      border-color: color-mix(in oklab, var(--primary) 45%, var(--border) 55%);
    }

    .stat-value {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .stat-label {
      color: var(--muted);
      font-size: 0.78rem;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-height: 82vh;
      overflow: hidden;
    }

    .topbar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .topbar h2 {
      font-size: 1.02rem;
      font-weight: 700;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .subject-select {
      background: color-mix(in oklab, var(--panel) 70%, black 30%);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 6px 8px;
      font-size: 0.83rem;
      outline: none;
    }

    .subject-select:focus {
      border-color: var(--primary);
    }

    .small-btn {
      background: color-mix(in oklab, var(--panel) 70%, black 30%);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
    }

    .small-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .status {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: #86efac;
      font-size: 0.85rem;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--success);
      box-shadow: 0 0 10px var(--success);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg {
      max-width: 78%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.45;
      border: 1px solid transparent;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }

    .msg.user {
      margin-left: auto;
      background: color-mix(in oklab, var(--primary) 35%, var(--panel) 65%);
      border-color: color-mix(in oklab, var(--primary) 60%, var(--border) 40%);
    }

    .msg.bot {
      background: var(--panel-soft);
      border-color: var(--border);
    }

    .msg small {
      display: block;
      margin-top: 6px;
      font-size: 0.74rem;
      color: var(--muted);
    }

    .composer {
      border-top: 1px solid var(--border);
      padding: 16px 20px 18px;
      display: grid;
      gap: 10px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    textarea {
      width: 100%;
      resize: none;
      min-height: 60px;
      max-height: 140px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      outline: none;
      background: color-mix(in oklab, var(--panel) 70%, black 30%);
      color: var(--text);
      line-height: 1.4;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
    }

    .send-btn {
      border: none;
      border-radius: 12px;
      padding: 0 18px;
      background: linear-gradient(120deg, var(--primary), var(--primary-dark));
      color: #00222a;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px color-mix(in oklab, var(--primary-dark) 55%, transparent 45%);
    }

    .send-btn:hover {
      filter: brightness(1.05);
    }

    .quick-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .quick-actions button {
      background: color-mix(in oklab, var(--panel) 70%, black 30%);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
    }

    .quick-actions button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .todo-list {
      margin-top: 8px;
      display: grid;
      gap: 6px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text);
      font-size: 0.85rem;
    }

    .todo-item input {
      accent-color: var(--primary);
    }

    .timer-value {
      margin-top: 8px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .status.offline {
      color: #fca5a5;
    }

    .status.offline .dot {
      background: var(--danger);
      box-shadow: 0 0 10px var(--danger);
    }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        order: 2;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="logo">AI</div>
        <div>
          <h1>Study Assistant</h1>
          <p>Smart help for every subject</p>
        </div>
      </div>

      <section>
        <p class="section-title">Study Tools</p>
        <div class="tool-grid panel-block">
          <button class="tool-btn" data-tool="notes">Generate Notes</button>
          <button class="tool-btn" data-tool="quiz">Create Quiz</button>
          <button class="tool-btn" data-tool="explain">Explain Topic</button>
          <button class="tool-btn" data-tool="plan">Revision Plan</button>
        </div>
      </section>

      <section>
        <p class="section-title">Today's Progress</p>
        <div class="stats panel-block">
          <div class="stat-card">
            <p class="stat-value" id="studyTime">00h 00m</p>
            <p class="stat-label">Study Time</p>
          </div>
          <div class="stat-card">
            <p class="stat-value" id="questionCount">0</p>
            <p class="stat-label">Questions</p>
          </div>
          <div class="stat-card">
            <p class="stat-value" id="flashcardCount">0</p>
            <p class="stat-label">Flashcards</p>
          </div>
          <div class="stat-card">
            <p class="stat-value" id="taskProgress">0%</p>
            <p class="stat-label">Quiz Score</p>
          </div>
        </div>
      </section>

      <section>
        <p class="section-title">Focus Timer</p>
        <div class="panel-block">
          <div class="timer-value" id="timerValue">25:00</div>
          <div class="quick-actions" style="margin-top: 8px;">
          <button type="button" class="small-btn" id="startTimerBtn">Start</button>
          <button type="button" class="small-btn" id="pauseTimerBtn">Pause</button>
          <button type="button" class="small-btn" id="resetTimerBtn">Reset</button>
          </div>
        </div>
      </section>

      <section>
        <p class="section-title">Tasks</p>
        <div class="todo-list panel-block" id="todoList"></div>
      </section>
    </aside>

    <main class="main">
      <div class="topbar">
        <h2>AI Tutor Chat</h2>
        <div class="topbar-actions">
          <select id="themeSelect" class="subject-select" title="Choose app theme">
            <option value="midnight">Midnight Blue</option>
            <option value="emerald">Emerald Dark</option>
            <option value="sunset">Sunset Purple</option>
            <option value="daylight">Daylight Pro</option>
          </select>
          <select id="subjectSelect" class="subject-select" title="Select subject context">
            <option>General</option>
            <option>Math</option>
            <option>Physics</option>
            <option>Chemistry</option>
            <option>Biology</option>
            <option>Computer Science</option>
            <option>History</option>
            <option>English</option>
          </select>
          <button type="button" class="small-btn" id="clearChatBtn">Clear Chat</button>
          <div class="status" id="statusBadge">
            <span class="dot"></span>
            Online
          </div>
        </div>
      </div>

      <section class="messages" id="messages"></section>

      <div class="composer">
        <div class="quick-actions">
          <button type="button" data-prompt="Summarize photosynthesis in simple words.">Quick Summary</button>
          <button type="button" data-prompt="Create 5 MCQs on Newton's laws.">Generate MCQs</button>
          <button type="button" data-prompt="Make a 7-day revision plan for chemistry.">Revision Plan</button>
          <button type="button" data-prompt="Explain this topic as if I am 12 years old.">Simple Explanation</button>
        </div>
        <div class="input-row">
          <textarea id="userInput" placeholder="Ask anything about your subject..."></textarea>
          <button class="send-btn" id="sendBtn" type="button">Send</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const messages = document.getElementById("messages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const themeSelect = document.getElementById("themeSelect");
    const subjectSelect = document.getElementById("subjectSelect");
    const clearChatBtn = document.getElementById("clearChatBtn");
    const questionCount = document.getElementById("questionCount");
    const flashcardCount = document.getElementById("flashcardCount");
    const studyTime = document.getElementById("studyTime");
    const taskProgress = document.getElementById("taskProgress");
    const timerValue = document.getElementById("timerValue");
    const startTimerBtn = document.getElementById("startTimerBtn");
    const pauseTimerBtn = document.getElementById("pauseTimerBtn");
    const resetTimerBtn = document.getElementById("resetTimerBtn");
    const todoList = document.getElementById("todoList");
    const statusBadge = document.getElementById("statusBadge");

    const STORAGE_KEYS = {
      chat: "study_assistant_chat_v1",
      stats: "study_assistant_stats_v1",
      tasks: "study_assistant_tasks_v1",
      subject: "study_assistant_subject_v1",
      theme: "study_assistant_theme_v1"
    };
    const API_CHAT_ENDPOINT = window.location.protocol === "file:"
      ? "http://localhost:3000/api/chat"
      : "/api/chat";

    const defaultTasks = [
      { text: "Review yesterday's notes", done: false },
      { text: "Complete one practice quiz", done: false },
      { text: "Revise weak topics", done: false }
    ];

    const appState = {
      chat: [],
      stats: {
        questions: 0,
        flashcards: 0,
        studyMinutes: 0
      },
      tasks: [],
      timerSeconds: 1500,
      timerRunning: false,
      timerId: null
    };

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function addMessage(text, role) {
      const bubble = document.createElement("div");
      bubble.className = `msg ${role}`;
      bubble.innerHTML = `${escapeHtml(text)}<small>${role === "user" ? "You" : "Assistant"}</small>`;
      messages.appendChild(bubble);
      messages.scrollTop = messages.scrollHeight;
    }

    function loadState() {
      try {
        const storedChat = JSON.parse(localStorage.getItem(STORAGE_KEYS.chat) || "[]");
        const storedStats = JSON.parse(localStorage.getItem(STORAGE_KEYS.stats) || "{}");
        const storedTasks = JSON.parse(localStorage.getItem(STORAGE_KEYS.tasks) || "null");
        const storedSubject = localStorage.getItem(STORAGE_KEYS.subject);
        const storedTheme = localStorage.getItem(STORAGE_KEYS.theme);

        appState.chat = Array.isArray(storedChat) ? storedChat : [];
        appState.stats.questions = Number(storedStats.questions || 0);
        appState.stats.flashcards = Number(storedStats.flashcards || 0);
        appState.stats.studyMinutes = Number(storedStats.studyMinutes || 0);
        appState.tasks = Array.isArray(storedTasks) ? storedTasks : defaultTasks;
        if (storedSubject) {
          subjectSelect.value = storedSubject;
        }
        if (storedTheme) {
          themeSelect.value = storedTheme;
        }
      } catch (error) {
        appState.tasks = defaultTasks;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEYS.chat, JSON.stringify(appState.chat));
      localStorage.setItem(STORAGE_KEYS.stats, JSON.stringify(appState.stats));
      localStorage.setItem(STORAGE_KEYS.tasks, JSON.stringify(appState.tasks));
      localStorage.setItem(STORAGE_KEYS.subject, subjectSelect.value);
      localStorage.setItem(STORAGE_KEYS.theme, themeSelect.value);
    }

    function applyTheme(theme) {
      document.body.setAttribute("data-theme", theme);
    }

    function formatStudyTime(minutes) {
      const hrs = Math.floor(minutes / 60);
      const mins = minutes % 60;
      return `${String(hrs).padStart(2, "0")}h ${String(mins).padStart(2, "0")}m`;
    }

    function renderStats() {
      questionCount.textContent = String(appState.stats.questions);
      flashcardCount.textContent = String(appState.stats.flashcards);
      studyTime.textContent = formatStudyTime(appState.stats.studyMinutes);

      const completed = appState.tasks.filter((task) => task.done).length;
      const progress = appState.tasks.length === 0
        ? 0
        : Math.round((completed / appState.tasks.length) * 100);
      taskProgress.textContent = `${progress}%`;
    }

    function renderTasks() {
      todoList.innerHTML = "";
      appState.tasks.forEach((task, index) => {
        const row = document.createElement("label");
        row.className = "todo-item";
        row.innerHTML = `
          <input type="checkbox" data-task-index="${index}" ${task.done ? "checked" : ""}>
          <span>${escapeHtml(task.text)}</span>
        `;
        todoList.appendChild(row);
      });
    }

    function renderChat() {
      messages.innerHTML = "";
      if (appState.chat.length === 0) {
        addMessage("Hi! I can help with summaries, quizzes, explanations, and exam prep. What topic are you studying today?", "bot");
        return;
      }

      appState.chat.forEach((item) => addMessage(item.text, item.role));
    }

    function saveAndRenderAll() {
      renderTasks();
      renderStats();
      saveState();
    }

    async function requestAssistantReply(text) {
      const response = await fetch(API_CHAT_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          message: text,
          subject: subjectSelect.value
        })
      });

      const payload = await response.json();
      if (!response.ok) {
        throw new Error(payload.error || "Unable to get assistant response.");
      }

      return String(payload.reply || "No reply available.");
    }

    async function handleSend() {
      const text = userInput.value.trim();
      if (!text) {
        return;
      }

      addMessage(text, "user");
      appState.chat.push({ text, role: "user" });
      appState.stats.questions += 1;
      userInput.value = "";
      sendBtn.disabled = true;
      sendBtn.textContent = "Sending...";

      try {
        const botText = await requestAssistantReply(text);
        if (/quiz|mcq/i.test(text)) {
          appState.stats.flashcards += 2;
        } else if (/summary|summarize|explain/i.test(text)) {
          appState.stats.flashcards += 1;
        }

        addMessage(botText, "bot");
        appState.chat.push({ text: botText, role: "bot" });
        saveAndRenderAll();
      } catch (error) {
        const fallback = `Server error: ${error.message}`;
        addMessage(fallback, "bot");
        appState.chat.push({ text: fallback, role: "bot" });
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "Send";
        saveAndRenderAll();
      }
    }

    sendBtn.addEventListener("click", handleSend);
    userInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        handleSend();
      }
    });

    document.querySelectorAll("[data-prompt]").forEach((btn) => {
      btn.addEventListener("click", () => {
        userInput.value = btn.dataset.prompt;
        userInput.focus();
      });
    });

    document.querySelectorAll("[data-tool]").forEach((btn) => {
      btn.addEventListener("click", () => {
        const tool = btn.dataset.tool;
        const prompts = {
          notes: "Generate concise notes from chapter 3 with key definitions.",
          quiz: "Create a quiz with 5 mixed difficulty MCQs.",
          explain: "Explain this topic in simple words with one example.",
          plan: "Create a 7-day revision plan for this subject."
        };
        userInput.value = prompts[tool];
        userInput.focus();
      });
    });

    clearChatBtn.addEventListener("click", () => {
      appState.chat = [];
      renderChat();
      saveState();
    });

    subjectSelect.addEventListener("change", () => {
      saveState();
      addMessage(`Subject context switched to ${subjectSelect.value}.`, "bot");
      appState.chat.push({ text: `Subject context switched to ${subjectSelect.value}.`, role: "bot" });
      saveState();
    });

    themeSelect.addEventListener("change", () => {
      applyTheme(themeSelect.value);
      saveState();
    });

    todoList.addEventListener("change", (event) => {
      const target = event.target;
      if (target.matches("input[type='checkbox']")) {
        const idx = Number(target.dataset.taskIndex);
        appState.tasks[idx].done = target.checked;
        saveAndRenderAll();
      }
    });

    function updateTimerDisplay() {
      const mins = Math.floor(appState.timerSeconds / 60);
      const secs = appState.timerSeconds % 60;
      timerValue.textContent = `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
    }

    function tickTimer() {
      if (!appState.timerRunning) {
        return;
      }
      if (appState.timerSeconds === 0) {
        appState.timerRunning = false;
        clearInterval(appState.timerId);
        addMessage("Pomodoro completed. Take a short break and then continue.", "bot");
        appState.chat.push({ text: "Pomodoro completed. Take a short break and then continue.", role: "bot" });
        appState.stats.studyMinutes += 25;
        saveAndRenderAll();
        return;
      }
      appState.timerSeconds -= 1;
      updateTimerDisplay();
    }

    startTimerBtn.addEventListener("click", () => {
      if (appState.timerRunning) {
        return;
      }
      appState.timerRunning = true;
      appState.timerId = setInterval(tickTimer, 1000);
    });

    pauseTimerBtn.addEventListener("click", () => {
      appState.timerRunning = false;
      clearInterval(appState.timerId);
    });

    resetTimerBtn.addEventListener("click", () => {
      appState.timerRunning = false;
      clearInterval(appState.timerId);
      appState.timerSeconds = 1500;
      updateTimerDisplay();
    });

    window.addEventListener("online", () => {
      statusBadge.classList.remove("offline");
      statusBadge.innerHTML = '<span class="dot"></span>Online';
    });

    window.addEventListener("offline", () => {
      statusBadge.classList.add("offline");
      statusBadge.innerHTML = '<span class="dot"></span>Offline';
    });

    loadState();
    applyTheme(themeSelect.value);
    renderChat();
    renderTasks();
    renderStats();
    updateTimerDisplay();
  </script>
</body>
</html>
